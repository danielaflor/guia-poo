site_name: Guia de Transição de Java para Python
site_description: Material de apoio para a transição de Java para Python em Programação Orientada a Objetos
site_url: https://danielaflor.github.io/guia-poo/

theme:
  name: material
  language: pt-BR
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest

plugins:
  - search

nav:
